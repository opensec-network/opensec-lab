networks:
  openseclab:
    name: openseclab
    external: true

volumes:
  opsn_dns_data:
  opsn_dvwa_data:
  opsn_gophish_data:
  opsn_mail_data:
  opsn_mail_roundcube:
  opsn_gitea_data:
  opsn_portal_html:
  opsn_wazuh_manager_data:
  opsn_wazuh_manager_logs:
  opsn_wazuh_manager_etc:
  opsn_wazuh_indexer_data:
  opsn_suricata_logs:
  opsn_api_logs:
  opsn_docs_html:

services:

  # ─────────────────────────────────────────────────────────────────
  # DNS — Technitium DNS Server
  # Profiles: dns, all
  # ─────────────────────────────────────────────────────────────────
  opsn-dns:
    image: technitium/dns-server:latest
    container_name: opsn-dns
    profiles: ["dns", "all"]
    hostname: opsn-dns
    environment:
      - DNS_SERVER_DOMAIN=opsn-dns
      - DNS_SERVER_ADMIN_PASSWORD=${OPSN_DNS_PASSWORD:-Password}
    volumes:
      - opsn_dns_data:/etc/dns
      - ./services/dns/configure_dns.sh:/configure_dns.sh:ro
    entrypoint: >
      /bin/sh -c "
        /usr/bin/dotnet /opt/technitium/dns/DnsServerApp.dll &
        sleep 5 &&
        bash /configure_dns.sh &&
        wait
      "
    ports:
      - "${OPSN_DNS_CONSOLE_PORT:-5380}:5380"
      - "53:53/udp"
      - "53:53/tcp"
    networks:
      - openseclab
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # DVWA — Damn Vulnerable Web Application
  # Profiles: dvwa, all
  # ─────────────────────────────────────────────────────────────────
  opsn-dvwa-db:
    image: mariadb:10.11
    container_name: opsn-dvwa-db
    profiles: ["dvwa", "all"]
    environment:
      - MYSQL_ROOT_PASSWORD=dvwaroot
      - MYSQL_DATABASE=dvwa
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=p@ssw0rd
    volumes:
      - opsn_dvwa_data:/var/lib/mysql
    networks:
      - openseclab
    restart: unless-stopped

  opsn-dvwa:
    image: ghcr.io/digininja/dvwa:latest
    container_name: opsn-dvwa
    profiles: ["dvwa", "all"]
    depends_on:
      - opsn-dvwa-db
    environment:
      - DB_SERVER=opsn-dvwa-db
      - DB_DATABASE=dvwa
      - DB_USER=dvwa
      - DB_PASSWORD=p@ssw0rd
    ports:
      - "${OPSN_DVWA_PORT:-8080}:80"
    networks:
      - openseclab
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Juice Shop — OWASP Juice Shop
  # Profiles: juice-shop, all
  # ─────────────────────────────────────────────────────────────────
  opsn-juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: opsn-juice-shop
    profiles: ["juice-shop", "all"]
    ports:
      - "${OPSN_JUICE_PORT:-3000}:3000"
    networks:
      - openseclab
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # WebGoat — Plataforma de aprendizaje guiado OWASP
  # Profiles: webgoat, all
  # ─────────────────────────────────────────────────────────────────
  opsn-webgoat:
    image: webgoat/webgoat:latest
    container_name: opsn-webgoat
    profiles: ["webgoat", "all"]
    ports:
      - "${OPSN_WEBGOAT_PORT:-8081}:8080"
    networks:
      - openseclab
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/WebGoat > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # API Vulnerable — OWASP API Security Top 10 (Flask custom)
  # Profiles: api, all
  # Puerto host: 8025 (liberado al eliminar crAPI)
  # Logs JSON → volumen opsn_api_logs (leidos por Wazuh via localfile)
  # ─────────────────────────────────────────────────────────────────
  opsn-api:
    build: ./services/api
    container_name: opsn-api
    profiles: ["api", "all"]
    environment:
      - LOG_FILE=/logs/api.log
    volumes:
      - opsn_api_logs:/logs
    ports:
      - "${OPSN_API_PORT:-8025}:5000"
    networks:
      - openseclab
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # GoPhish Volume Init — fija permisos del volumen para uid 1000 (app)
  # Profiles: gophish, all
  # ─────────────────────────────────────────────────────────────────
  opsn-gophish-volume-init:
    image: alpine:latest
    container_name: opsn-gophish-volume-init
    profiles: ["gophish", "all"]
    user: root
    volumes:
      - opsn_gophish_data:/vol
    command: ["sh", "-c", "chown -R 1000:1000 /vol && chmod 755 /vol"]
    restart: "no"

  # ─────────────────────────────────────────────────────────────────
  # GoPhish — Framework de phishing
  # Profiles: gophish, all
  # ─────────────────────────────────────────────────────────────────
  opsn-gophish:
    image: opensecnetwork/gophish:multi-arch
    container_name: opsn-gophish
    profiles: ["gophish", "all"]
    depends_on:
      opsn-gophish-volume-init:
        condition: service_completed_successfully
    volumes:
      - opsn_gophish_data:/opt/gophish/data
      - ./services/gophish/config.json:/opt/gophish/config.json:ro
    ports:
      - "${OPSN_GOPHISH_ADMIN_PORT:-3333}:3333"
      - "${OPSN_GOPHISH_PHISH_PORT:-80}:80"
    networks:
      openseclab:
        aliases:
          - gophish.opensec.lab
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # GoPhish Init — configura campaña via API REST (sidecar efímero)
  # Profiles: gophish, all
  # ─────────────────────────────────────────────────────────────────
  opsn-gophish-init:
    image: alpine/curl:latest
    container_name: opsn-gophish-init
    profiles: ["gophish", "all"]
    depends_on:
      opsn-gophish:
        condition: service_started
      opsn-mail:
        condition: service_started
      opsn-gophish-volume-init:
        condition: service_completed_successfully
    environment:
      - OPSN_DOMAIN=${OPSN_DOMAIN:-opensec.lab}
      - OPSN_MAIL_HOST=opsn-mail
      - OPSN_GOPHISH_SMTP_PORT=${OPSN_GOPHISH_SMTP_PORT:-25}
      - OPSN_GOPHISH_PASSWORD=${OPSN_GOPHISH_PASSWORD:-Password}
      - OPSN_GOPHISH_FROM_NAME=${OPSN_GOPHISH_FROM_NAME:-Soporte IT}
      - "OPSN_GOPHISH_COMPANY_NAME=${OPSN_GOPHISH_COMPANY_NAME:-Acme Corp}"
      - "OPSN_GOPHISH_EMAIL_SUBJECT=${OPSN_GOPHISH_EMAIL_SUBJECT:-Accion requerida: Restablece tu contrasena corporativa}"
      - "OPSN_GOPHISH_SUPPORT_TEAM=${OPSN_GOPHISH_SUPPORT_TEAM:-Equipo de Seguridad IT}"
    volumes:
      - ./services/gophish:/config:ro
      - opsn_gophish_data:/data:ro
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache sqlite > /dev/null 2>&1 && /bin/sh /config/configure_gophish.sh"]
    networks:
      - openseclab
    restart: "no"

  # ─────────────────────────────────────────────────────────────────
  # Desktop — KDE Webtop con Thunderbird
  # Profiles: desktop, all
  # ─────────────────────────────────────────────────────────────────
  opsn-desktop:
    image: lscr.io/linuxserver/webtop:ubuntu-xfce
    container_name: opsn-desktop
    profiles: ["desktop", "all"]
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
      - SELKIES_MANUAL_WIDTH=1680
      - SELKIES_MANUAL_HEIGHT=900
      - SELKIES_USE_CSS_SCALING=true
      - SELKIES_ENABLE_RESIZE=false
      - OPSN_DOMAIN=${OPSN_DOMAIN:-opensec.lab}
      - OPSN_MAIL_HOST=mail.${OPSN_DOMAIN:-opensec.lab}
      - OPSN_MAIL_USER=${OPSN_MAIL_USER:-user}
      - OPSN_MAIL_PASSWORD=${OPSN_MAIL_PASSWORD:-Password}
      - OPSN_MAIL_SMTP_PORT=${OPSN_MAIL_SMTP_PORT:-587}
      - OPSN_MAIL_IMAP_PORT=143
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./services/desktop/custom-init.sh:/custom-cont-init.d/99-opsn-init.sh:ro
      - ./services/desktop/init.sh:/custom-cont-init.d/98-opsn-x11.sh:ro
      - ./services/desktop/opsn-background.jpg:/config/opsn-background.jpg:ro
    ports:
      - "${OPSN_DESKTOP_PORT:-3100}:3000"
      - "${OPSN_DESKTOP_HTTPS_PORT:-3101}:3001"
    networks:
      - openseclab
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000 > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Mail — Servidor de correo (Postfix + Dovecot + Roundcube)
  # Profiles: mail, all
  # ─────────────────────────────────────────────────────────────────
  opsn-mail:
    build: ./services/mail
    container_name: opsn-mail
    profiles: ["mail", "all"]
    hostname: mail.${OPSN_DOMAIN:-opensec.lab}
    environment:
      - OPSN_DOMAIN=${OPSN_DOMAIN:-opensec.lab}
      - OPSN_MAIL_PASSWORD=${OPSN_MAIL_PASSWORD:-Password}
    volumes:
      - opsn_mail_data:/var/mail
      - opsn_mail_roundcube:/var/www/html/roundcube/config
    ports:
      - "25:25"
      - "143:143"
      - "587:587"
      - "${OPSN_MAIL_WEBMAIL_PORT:-8888}:80"
    networks:
      openseclab:
        aliases:
          - mail.opensec.lab
          - webmail.opensec.lab
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/143' 2>/dev/null && bash -c '</dev/tcp/localhost/587' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Gitea — Repositorios de código vulnerable
  # Profiles: gitea, all
  # ─────────────────────────────────────────────────────────────────
  opsn-gitea:
    image: gitea/gitea:latest
    container_name: opsn-gitea
    profiles: ["gitea", "all"]
    entrypoint: ["/gitea-entrypoint.sh"]
    command: ["/usr/bin/s6-svscan", "/etc/s6"]
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__PATH=/data/gitea/gitea.db
      - GITEA__server__DOMAIN=git.${OPSN_DOMAIN:-opensec.lab}
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__ROOT_URL=http://localhost:${OPSN_GITEA_PORT:-3002}/
      - GITEA__server__DISABLE_SSH=false
      - GITEA__server__SSH_PORT=${OPSN_GITEA_SSH_PORT:-2222}
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__service__DISABLE_REGISTRATION=true
      - OPSN_GITEA_ADMIN_USER=${OPSN_GITEA_ADMIN_USER:-admin}
      - OPSN_GITEA_PASSWORD=${OPSN_GITEA_PASSWORD:-Password}
      - OPSN_DOMAIN=${OPSN_DOMAIN:-opensec.lab}
    volumes:
      - opsn_gitea_data:/data
      - ./services/gitea/gitea-entrypoint.sh:/gitea-entrypoint.sh:ro
    ports:
      - "${OPSN_GITEA_PORT:-3002}:3000"
      - "${OPSN_GITEA_SSH_PORT:-2222}:22"
    networks:
      - openseclab
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000 > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Gitea Init — crea repos vulnerables via API (sidecar efímero)
  # Profiles: gitea, all
  # ─────────────────────────────────────────────────────────────────
  opsn-gitea-init:
    image: alpine/curl:latest
    container_name: opsn-gitea-init
    profiles: ["gitea", "all"]
    depends_on:
      opsn-gitea:
        condition: service_healthy
    environment:
      - OPSN_DOMAIN=${OPSN_DOMAIN:-opensec.lab}
      - OPSN_GITEA_PASSWORD=${OPSN_GITEA_PASSWORD:-Password}
      - OPSN_GITEA_ADMIN_USER=${OPSN_GITEA_ADMIN_USER:-admin}
      - OPSN_GITEA_PORT=${OPSN_GITEA_PORT:-3002}
    volumes:
      - ./services/gitea/configure_gitea.sh:/configure_gitea.sh:ro
      - ./services/lib/common.sh:/lib/common.sh:ro
    entrypoint: ["/bin/sh", "/configure_gitea.sh"]
    networks:
      - openseclab
    restart: "no"

  # ─────────────────────────────────────────────────────────────────
  # Portal Init — genera el HTML del dashboard (sidecar efímero)
  # Profiles: portal, all
  # ─────────────────────────────────────────────────────────────────
  opsn-portal-init:
    image: alpine:latest
    container_name: opsn-portal-init
    profiles: ["portal", "all"]
    environment:
      - OPSN_DOMAIN=${OPSN_DOMAIN:-opensec.lab}
      - OPSN_DNS_CONSOLE_PORT=${OPSN_DNS_CONSOLE_PORT:-5380}
      - OPSN_DVWA_PORT=${OPSN_DVWA_PORT:-8080}
      - OPSN_JUICE_PORT=${OPSN_JUICE_PORT:-3000}
      - OPSN_GOPHISH_ADMIN_PORT=${OPSN_GOPHISH_ADMIN_PORT:-3333}
      - OPSN_DESKTOP_PORT=${OPSN_DESKTOP_PORT:-3100}
      - OPSN_MAIL_WEBMAIL_PORT=${OPSN_MAIL_WEBMAIL_PORT:-8888}
      - OPSN_WEBGOAT_PORT=${OPSN_WEBGOAT_PORT:-8081}
      - OPSN_GITEA_PORT=${OPSN_GITEA_PORT:-3002}
      - OPSN_API_PORT=${OPSN_API_PORT:-8025}
      - OPSN_DOCS_PORT=${OPSN_DOCS_PORT:-4000}
    volumes:
      - opsn_portal_html:/html
      - ./services/portal/generate_portal.sh:/generate_portal.sh:ro
    entrypoint: ["/bin/sh", "/generate_portal.sh"]
    networks:
      - openseclab
    restart: "no"

  # ─────────────────────────────────────────────────────────────────
  # Portal — nginx sirve el dashboard HTML
  # Profiles: portal, all
  # ─────────────────────────────────────────────────────────────────
  opsn-portal:
    image: nginx:alpine
    container_name: opsn-portal
    profiles: ["portal", "all"]
    depends_on:
      opsn-portal-init:
        condition: service_completed_successfully
    volumes:
      - opsn_portal_html:/html
      - ./services/portal/assets:/html/assets:ro
      - ./services/portal/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${OPSN_PORTAL_PORT:-8443}:80"
    networks:
      - openseclab
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Docs Build — genera HTML con MkDocs Material (sidecar efimero)
  # Profiles: docs, all
  # ─────────────────────────────────────────────────────────────────
  opsn-docs-build:
    image: squidfunk/mkdocs-material
    container_name: opsn-docs-build
    profiles: ["docs", "all"]
    volumes:
      - ./services/docs:/docs
      - opsn_docs_html:/site
    entrypoint: ["mkdocs", "build", "--config-file", "/docs/mkdocs.yml",
                 "--site-dir", "/site"]
    networks:
      - openseclab
    restart: "no"

  # ─────────────────────────────────────────────────────────────────
  # Docs — nginx sirve la documentacion MkDocs Material
  # Profiles: docs, all
  # Puerto: 4000
  # ─────────────────────────────────────────────────────────────────
  opsn-docs:
    image: nginx:alpine
    container_name: opsn-docs
    profiles: ["docs", "all"]
    depends_on:
      opsn-docs-build:
        condition: service_completed_successfully
    volumes:
      - opsn_docs_html:/usr/share/nginx/html:ro
      - ./services/docs/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${OPSN_DOCS_PORT:-4000}:80"
    networks:
      - openseclab
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # ─── TIER 3: BLUE TEAM — SIEM + IDS ─────────────────────────────
  # ─────────────────────────────────────────────────────────────────
  # NOTA: Requiere 12+ GB RAM y vm.max_map_count=262144 en el host.
  #   sudo sysctl -w vm.max_map_count=262144
  # ─────────────────────────────────────────────────────────────────

  # Wazuh Certs Generator — genera certificados SSL para el stack Wazuh
  # (contenedor efímero: corre una vez y sale)
  opsn-wazuh-certs:
    image: wazuh/wazuh-certs-generator:0.0.2
    container_name: opsn-wazuh-certs
    profiles: ["wazuh", "blue-team"]
    volumes:
      - ./services/wazuh/certs:/certificates
      - ./services/wazuh/config/certs.yml:/config/certs.yml:ro
    networks:
      - openseclab
    restart: "no"

  # ─────────────────────────────────────────────────────────────────
  # Wazuh Indexer — OpenSearch (almacenamiento de alertas e indices)
  # Profiles: wazuh, blue-team
  # Puerto interno: 9200 (HTTPS) — no expuesto al host
  # RAM: ~1.5 GB
  # ─────────────────────────────────────────────────────────────────
  opsn-wazuh-indexer:
    image: wazuh/wazuh-indexer:4.9.0
    container_name: opsn-wazuh-indexer
    profiles: ["wazuh", "blue-team"]
    depends_on:
      opsn-wazuh-certs:
        condition: service_completed_successfully
    hostname: opsn-wazuh-indexer
    environment:
      - OPENSEARCH_JAVA_OPTS=${OPSN_WAZUH_INDEXER_JAVA_OPTS:--Xms512m -Xmx512m -Djava.security.manager=allow}
      - bootstrap.memory_lock=true
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${OPSN_WAZUH_PASSWORD:-Password1.}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opsn_wazuh_indexer_data:/var/lib/wazuh-indexer
      - ./services/wazuh/certs:/usr/share/wazuh-indexer/certs
      - ./services/wazuh/config/wazuh_indexer.yml:/usr/share/wazuh-indexer/opensearch.yml:ro
    networks:
      openseclab:
        aliases:
          - wazuh.indexer
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Wazuh Manager — motor de analisis, correlacion y agentes
  # Profiles: wazuh, blue-team
  # Puertos: 1514 (agentes), 1515 (enrollment), 55000 (API REST)
  # RAM: ~500 MB
  # ─────────────────────────────────────────────────────────────────
  opsn-wazuh-manager:
    image: wazuh/wazuh-manager:4.9.0
    container_name: opsn-wazuh-manager
    profiles: ["wazuh", "blue-team"]
    depends_on:
      opsn-wazuh-certs:
        condition: service_completed_successfully
      opsn-wazuh-indexer:
        condition: service_started
    hostname: opsn-wazuh-manager
    environment:
      - INDEXER_URL=https://opsn-wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${OPSN_WAZUH_PASSWORD:-Password1.}
      - FILEBEAT_SSL_VERIFICATION_MODE=none
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/wazuh-manager.pem
      - SSL_KEY=/etc/ssl/wazuh-manager-key.pem
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=${OPSN_WAZUH_API_PASSWORD:-WazuhApiP4ss.}
    volumes:
      - opsn_wazuh_manager_data:/var/ossec/data
      - opsn_wazuh_manager_logs:/var/ossec/logs
      - opsn_wazuh_manager_etc:/var/ossec/etc
      - ./services/wazuh/certs:/etc/ssl:ro
      - opsn_suricata_logs:/var/ossec/logs/suricata:ro
      - opsn_api_logs:/var/ossec/logs/api:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./services/wazuh/config/ossec.conf:/wazuh-config-mount/etc/ossec.conf:ro
      - ./services/wazuh/rules/openseclab.xml:/var/ossec/etc/rules/openseclab.xml:ro
    ports:
      - "1514:1514/udp"
      - "1514:1514/tcp"
      - "1515:1515"
      - "${OPSN_WAZUH_API_PORT:-55000}:55000"
    networks:
      openseclab:
        aliases:
          - wazuh.manager
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Wazuh Dashboard — interfaz web de visualizacion (HTTPS)
  # Profiles: wazuh, blue-team
  # Puerto: 5601 (HTTPS)
  # RAM: ~500 MB
  # ─────────────────────────────────────────────────────────────────
  opsn-wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.9.0
    container_name: opsn-wazuh-dashboard
    profiles: ["wazuh", "blue-team"]
    depends_on:
      opsn-wazuh-certs:
        condition: service_completed_successfully
      opsn-wazuh-indexer:
        condition: service_started
      opsn-wazuh-manager:
        condition: service_started
    hostname: opsn-wazuh-dashboard
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${OPSN_WAZUH_PASSWORD:-Password1.}
      - WAZUH_API_URL=https://opsn-wazuh-manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=${OPSN_WAZUH_PASSWORD:-Password1.}
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=${OPSN_WAZUH_API_PASSWORD:-WazuhApiP4ss.}
    volumes:
      - ./services/wazuh/certs:/usr/share/wazuh-dashboard/certs:ro
      - ./services/wazuh/config/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro
      - ./services/wazuh/config/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml:ro
    ports:
      - "${OPSN_WAZUH_DASH_PORT:-5601}:5601"
    networks:
      openseclab:
        aliases:
          - wazuh.dashboard
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Wazuh Init — inicializa security index y dirs de logs (sidecar efimero)
  # Profiles: wazuh, blue-team
  # Requiere docker.sock para ejecutar comandos dentro del indexer y manager
  # ─────────────────────────────────────────────────────────────────
  opsn-wazuh-init:
    image: docker:cli
    container_name: opsn-wazuh-init
    profiles: ["wazuh", "blue-team"]
    depends_on:
      opsn-wazuh-certs:
        condition: service_completed_successfully
      opsn-wazuh-indexer:
        condition: service_started
      opsn-wazuh-manager:
        condition: service_started
    environment:
      - OPSN_WAZUH_INDEXER_HOST=opsn-wazuh-indexer
      - OPSN_WAZUH_INDEXER_PORT=9200
      - OPSN_WAZUH_PASSWORD=${OPSN_WAZUH_PASSWORD:-Password1.}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./services/wazuh/configure_wazuh.sh:/configure_wazuh.sh:ro
      - ./services/lib/common.sh:/lib/common.sh:ro
    entrypoint: ["/bin/sh", "/configure_wazuh.sh"]
    networks:
      - openseclab
    restart: "no"

  # ─────────────────────────────────────────────────────────────────
  # Suricata — IDS que monitorea el trafico de la red Docker
  # Profiles: suricata, blue-team
  # Sin puertos expuestos: escribe eve.json en volumen compartido
  # RAM: ~500 MB
  # NOTA: Requiere NET_ADMIN y NET_RAW capabilities
  # La variable OPSN_SURICATA_INTERFACE controla la interfaz a monitorear
  # (default: "any" — captura en todas las interfaces del host)
  # ─────────────────────────────────────────────────────────────────
  opsn-suricata:
    image: jasonish/suricata:latest
    container_name: opsn-suricata
    profiles: ["suricata", "blue-team"]
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    environment:
      - SURICATA_INTERFACE=${OPSN_SURICATA_INTERFACE:-any}
    volumes:
      - opsn_suricata_logs:/var/log/suricata
      - ./services/suricata/suricata.yaml:/etc/suricata/suricata.yaml
      - ./services/suricata/rules/openseclab.rules:/etc/suricata/rules/openseclab.rules
    command: ["-i", "${OPSN_SURICATA_INTERFACE:-any}", "-v"]
    restart: unless-stopped
