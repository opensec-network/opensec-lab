networks:
  openseclab:
    name: openseclab
    external: true

volumes:
  opsn_dns_data:
  opsn_dvwa_data:
  opsn_gophish_data:
  opsn_mail_data:
  opsn_mail_roundcube:
  opsn_crapi_data:
  opsn_crapi_postgres:
  opsn_portainer_data:
  opsn_wiki_db:
  opsn_wiki_data:
  opsn_gitea_data:
  opsn_portal_html:
  opsn_wazuh_manager_data:
  opsn_wazuh_manager_logs:
  opsn_wazuh_manager_etc:
  opsn_wazuh_indexer_data:
  opsn_suricata_logs:

services:

  # ─────────────────────────────────────────────────────────────────
  # DNS — Technitium DNS Server
  # Profiles: dns, all
  # ─────────────────────────────────────────────────────────────────
  opsn-dns:
    image: technitium/dns-server:latest
    container_name: opsn-dns
    profiles: ["dns", "all"]
    hostname: opsn-dns
    environment:
      - DNS_SERVER_DOMAIN=opsn-dns
      - DNS_SERVER_ADMIN_PASSWORD=${OPSN_DNS_PASSWORD:-Password}
    volumes:
      - opsn_dns_data:/etc/dns
      - ./services/dns/configure_dns.sh:/configure_dns.sh:ro
    entrypoint: >
      /bin/sh -c "
        /usr/bin/dotnet /opt/technitium/dns/DnsServerApp.dll &
        sleep 5 &&
        bash /configure_dns.sh &&
        wait
      "
    ports:
      - "${OPSN_DNS_CONSOLE_PORT:-5380}:5380"
      - "53:53/udp"
      - "53:53/tcp"
    networks:
      - openseclab
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # DVWA — Damn Vulnerable Web Application
  # Profiles: dvwa, all
  # ─────────────────────────────────────────────────────────────────
  opsn-dvwa-db:
    image: mariadb:10.11
    container_name: opsn-dvwa-db
    profiles: ["dvwa", "all"]
    environment:
      - MYSQL_ROOT_PASSWORD=dvwaroot
      - MYSQL_DATABASE=dvwa
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=p@ssw0rd
    volumes:
      - opsn_dvwa_data:/var/lib/mysql
    networks:
      - openseclab
    restart: unless-stopped

  opsn-dvwa:
    image: ghcr.io/digininja/dvwa:latest
    container_name: opsn-dvwa
    profiles: ["dvwa", "all"]
    depends_on:
      - opsn-dvwa-db
    environment:
      - DB_SERVER=opsn-dvwa-db
      - DB_DATABASE=dvwa
      - DB_USER=dvwa
      - DB_PASSWORD=p@ssw0rd
    ports:
      - "${OPSN_DVWA_PORT:-8080}:80"
    networks:
      - openseclab
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Juice Shop — OWASP Juice Shop
  # Profiles: juice-shop, all
  # ─────────────────────────────────────────────────────────────────
  opsn-juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: opsn-juice-shop
    profiles: ["juice-shop", "all"]
    ports:
      - "${OPSN_JUICE_PORT:-3000}:3000"
    networks:
      - openseclab
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # WebGoat — Plataforma de aprendizaje guiado OWASP
  # Profiles: webgoat, all
  # ─────────────────────────────────────────────────────────────────
  opsn-webgoat:
    image: webgoat/webgoat:latest
    container_name: opsn-webgoat
    profiles: ["webgoat", "all"]
    ports:
      - "${OPSN_WEBGOAT_PORT:-8081}:8080"
    networks:
      - openseclab
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/WebGoat > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # crAPI — Completely Ridiculous API (multi-container)
  # Profiles: crapi, all
  # Puertos expuestos: 8025 → crapi-web (UI + proxy API)
  # RAM estimada: ~1.5 GB total para todos los subservicios
  # Referencia: https://github.com/OWASP/crAPI
  # ─────────────────────────────────────────────────────────────────

  opsn-crapi-mongo:
    image: mongo:4.4
    container_name: opsn-crapi-mongo
    profiles: ["crapi", "all"]
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=crapisecretpassword
    volumes:
      - opsn_crapi_data:/data/db
    networks:
      - openseclab
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  opsn-crapi-postgres:
    image: postgres:14-alpine
    container_name: opsn-crapi-postgres
    profiles: ["crapi", "all"]
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=crapisecretpassword
      - POSTGRES_DB=crapi
    volumes:
      - opsn_crapi_postgres:/var/lib/postgresql/data
    networks:
      - openseclab
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d crapi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  opsn-crapi-mailhog:
    image: crapi/mailhog:latest
    container_name: opsn-crapi-mailhog
    profiles: ["crapi", "all"]
    networks:
      - openseclab
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1025"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  opsn-crapi-identity:
    image: crapi/crapi-identity:latest
    container_name: opsn-crapi-identity
    profiles: ["crapi", "all"]
    depends_on:
      opsn-crapi-mongo:
        condition: service_healthy
      opsn-crapi-postgres:
        condition: service_healthy
      opsn-crapi-mailhog:
        condition: service_healthy
    environment:
      - DB_NAME=crapi
      - DB_USER=admin
      - DB_PASSWORD=crapisecretpassword
      - DB_HOST=opsn-crapi-postgres
      - DB_PORT=5432
      - SERVER_PORT=8080
      - MONGO_DB_HOST=opsn-crapi-mongo
      - MONGO_DB_PORT=27017
      - MAILHOG_HOST=opsn-crapi-mailhog
      - MAILHOG_PORT=1025
      - MAILHOG_DOMAIN=example.com
      - SMTP_HOST=opsn-crapi-mailhog
      - SMTP_PORT=1025
      - SMTP_EMAIL=no-reply@example.com
      - SMTP_PASS=password
      - SMTP_FROM=no-reply@example.com
      - SMTP_AUTH=false
      - SMTP_STARTTLS=false
      - JWT_SECRET=crapi
      - JWT_EXPIRATION=604800000
      - API_GATEWAY_URL=https://api.mypremiumdealership.com
      - TLS_ENABLED=false
      - ENABLE_SHELL_INJECTION=false
      - ENABLE_LOG4J=false
    networks:
      - openseclab
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' http://localhost:8080/identity/api/v2/user/login | grep -qv '^000'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  opsn-crapi-community:
    image: crapi/crapi-community:latest
    container_name: opsn-crapi-community
    profiles: ["crapi", "all"]
    depends_on:
      opsn-crapi-mongo:
        condition: service_healthy
      opsn-crapi-postgres:
        condition: service_healthy
      opsn-crapi-identity:
        condition: service_started
    environment:
      - DB_NAME=crapi
      - DB_USER=admin
      - DB_PASSWORD=crapisecretpassword
      - DB_HOST=opsn-crapi-postgres
      - DB_PORT=5432
      - SERVER_PORT=8087
      - MONGO_DB_HOST=opsn-crapi-mongo
      - MONGO_DB_PORT=27017
      - MONGO_DB_USER=admin
      - MONGO_DB_PASSWORD=crapisecretpassword
      - MONGO_DB_NAME=crapi
      - IDENTITY_SERVICE=opsn-crapi-identity:8080
      - SECRET_KEY=crapi
      - TLS_ENABLED=false
    networks:
      - openseclab
    restart: unless-stopped

  opsn-crapi-workshop:
    image: crapi/crapi-workshop:latest
    container_name: opsn-crapi-workshop
    profiles: ["crapi", "all"]
    depends_on:
      opsn-crapi-postgres:
        condition: service_healthy
      opsn-crapi-mongo:
        condition: service_healthy
      opsn-crapi-identity:
        condition: service_started
      opsn-crapi-community:
        condition: service_started
    environment:
      - DB_NAME=crapi
      - DB_USER=admin
      - DB_PASSWORD=crapisecretpassword
      - DB_HOST=opsn-crapi-postgres
      - DB_PORT=5432
      - SERVER_PORT=8000
      - MONGO_DB_HOST=opsn-crapi-mongo
      - MONGO_DB_PORT=27017
      - MONGO_DB_USER=admin
      - MONGO_DB_PASSWORD=crapisecretpassword
      - MONGO_DB_NAME=crapi
      - IDENTITY_SERVICE=opsn-crapi-identity:8080
      - SECRET_KEY=crapi
      - API_GATEWAY_URL=https://api.mypremiumdealership.com
      - TLS_ENABLED=false
      - FILES_LIMIT=1000
      - GUNICORN_WORKERS=4
      - GUNICORN_TIMEOUT=120
      - DB_CONN_MAX_AGE=600
    networks:
      - openseclab
    restart: unless-stopped

  opsn-crapi:
    image: crapi/crapi-web:latest
    container_name: opsn-crapi
    profiles: ["crapi", "all"]
    depends_on:
      opsn-crapi-identity:
        condition: service_healthy
      opsn-crapi-community:
        condition: service_started
      opsn-crapi-workshop:
        condition: service_started
    environment:
      - IDENTITY_SERVICE=opsn-crapi-identity:8080
      - COMMUNITY_SERVICE=opsn-crapi-community:8087
      - WORKSHOP_SERVICE=opsn-crapi-workshop:8000
      - CHATBOT_SERVICE=127.0.0.1:5002
      - MAILHOG_WEB_SERVICE=opsn-crapi-mailhog:8025
      - TLS_ENABLED=false
    ports:
      - "${OPSN_CRAPI_PORT:-8025}:80"
    networks:
      - openseclab
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Portainer — Gestión visual de Docker
  # Profiles: portainer, all
  # NOTA: monta docker.sock — herramienta administrativa, NO un target de ataque
  # ─────────────────────────────────────────────────────────────────
  opsn-portainer:
    image: portainer/portainer-ce:latest
    container_name: opsn-portainer
    profiles: ["portainer", "all"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - opsn_portainer_data:/data
    ports:
      - "${OPSN_PORTAINER_PORT:-9443}:9443"
    networks:
      - openseclab
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Portainer Init — crea admin y endpoint Docker via API (sidecar efimero)
  # Profiles: portainer, all
  # ─────────────────────────────────────────────────────────────────
  opsn-portainer-init:
    image: alpine/curl:latest
    container_name: opsn-portainer-init
    profiles: ["portainer", "all"]
    depends_on:
      opsn-portainer:
        condition: service_started
    environment:
      - OPSN_PORTAINER_PASSWORD=${OPSN_PORTAINER_PASSWORD:-Password}
    volumes:
      - ./services/portainer/configure_portainer.sh:/configure_portainer.sh:ro
      - ./services/lib/common.sh:/lib/common.sh:ro
    entrypoint: ["/bin/sh", "/configure_portainer.sh"]
    networks:
      - openseclab
    restart: "no"

  # ─────────────────────────────────────────────────────────────────
  # GoPhish Volume Init — fija permisos del volumen para uid 1000 (app)
  # Profiles: gophish, all
  # ─────────────────────────────────────────────────────────────────
  opsn-gophish-volume-init:
    image: alpine:latest
    container_name: opsn-gophish-volume-init
    profiles: ["gophish", "all"]
    user: root
    volumes:
      - opsn_gophish_data:/vol
    command: ["sh", "-c", "chown -R 1000:1000 /vol && chmod 755 /vol"]
    restart: "no"

  # ─────────────────────────────────────────────────────────────────
  # GoPhish — Framework de phishing
  # Profiles: gophish, all
  # ─────────────────────────────────────────────────────────────────
  opsn-gophish:
    image: opensecnetwork/gophish:multi-arch
    container_name: opsn-gophish
    profiles: ["gophish", "all"]
    depends_on:
      opsn-gophish-volume-init:
        condition: service_completed_successfully
    volumes:
      - opsn_gophish_data:/opt/gophish/data
      - ./services/gophish/config.json:/opt/gophish/config.json:ro
    ports:
      - "${OPSN_GOPHISH_ADMIN_PORT:-3333}:3333"
      - "${OPSN_GOPHISH_PHISH_PORT:-80}:80"
    networks:
      openseclab:
        aliases:
          - gophish.opensec.lab
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # GoPhish Init — configura campaña via API REST (sidecar efímero)
  # Profiles: gophish, all
  # ─────────────────────────────────────────────────────────────────
  opsn-gophish-init:
    image: alpine/curl:latest
    container_name: opsn-gophish-init
    profiles: ["gophish", "all"]
    depends_on:
      opsn-gophish:
        condition: service_started
      opsn-mail:
        condition: service_started
      opsn-gophish-volume-init:
        condition: service_completed_successfully
    environment:
      - OPSN_DOMAIN=${OPSN_DOMAIN:-opensec.lab}
      - OPSN_MAIL_HOST=opsn-mail
      - OPSN_GOPHISH_SMTP_PORT=${OPSN_GOPHISH_SMTP_PORT:-25}
      - OPSN_GOPHISH_PASSWORD=${OPSN_GOPHISH_PASSWORD:-Password}
      - OPSN_GOPHISH_FROM_NAME=${OPSN_GOPHISH_FROM_NAME:-Soporte IT}
      - "OPSN_GOPHISH_COMPANY_NAME=${OPSN_GOPHISH_COMPANY_NAME:-Acme Corp}"
      - "OPSN_GOPHISH_EMAIL_SUBJECT=${OPSN_GOPHISH_EMAIL_SUBJECT:-Accion requerida: Restablece tu contrasena corporativa}"
      - "OPSN_GOPHISH_SUPPORT_TEAM=${OPSN_GOPHISH_SUPPORT_TEAM:-Equipo de Seguridad IT}"
    volumes:
      - ./services/gophish:/config:ro
      - opsn_gophish_data:/data:ro
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache sqlite > /dev/null 2>&1 && /bin/sh /config/configure_gophish.sh"]
    networks:
      - openseclab
    restart: "no"

  # ─────────────────────────────────────────────────────────────────
  # Desktop — KDE Webtop con Thunderbird
  # Profiles: desktop, all
  # ─────────────────────────────────────────────────────────────────
  opsn-desktop:
    image: lscr.io/linuxserver/webtop:ubuntu-xfce
    container_name: opsn-desktop
    profiles: ["desktop", "all"]
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
      - SELKIES_MANUAL_WIDTH=1680
      - SELKIES_MANUAL_HEIGHT=900
      - SELKIES_USE_CSS_SCALING=true
      - SELKIES_ENABLE_RESIZE=false
      - OPSN_DOMAIN=${OPSN_DOMAIN:-opensec.lab}
      - OPSN_MAIL_HOST=mail.${OPSN_DOMAIN:-opensec.lab}
      - OPSN_MAIL_USER=${OPSN_MAIL_USER:-user}
      - OPSN_MAIL_PASSWORD=${OPSN_MAIL_PASSWORD:-Password}
      - OPSN_MAIL_SMTP_PORT=${OPSN_MAIL_SMTP_PORT:-587}
      - OPSN_MAIL_IMAP_PORT=143
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./services/desktop/custom-init.sh:/custom-cont-init.d/99-opsn-init.sh:ro
      - ./services/desktop/init.sh:/custom-cont-init.d/98-opsn-x11.sh:ro
      - ./services/desktop/opsn-background.jpg:/config/opsn-background.jpg:ro
    ports:
      - "${OPSN_DESKTOP_PORT:-3100}:3000"
      - "${OPSN_DESKTOP_HTTPS_PORT:-3101}:3001"
    networks:
      - openseclab
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000 > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Mail — Servidor de correo (Postfix + Dovecot + Roundcube)
  # Profiles: mail, all
  # ─────────────────────────────────────────────────────────────────
  opsn-mail:
    build: ./services/mail
    container_name: opsn-mail
    profiles: ["mail", "all"]
    hostname: mail.${OPSN_DOMAIN:-opensec.lab}
    environment:
      - OPSN_DOMAIN=${OPSN_DOMAIN:-opensec.lab}
      - OPSN_MAIL_PASSWORD=${OPSN_MAIL_PASSWORD:-Password}
    volumes:
      - opsn_mail_data:/var/mail
      - opsn_mail_roundcube:/var/www/html/roundcube/config
    ports:
      - "25:25"
      - "143:143"
      - "587:587"
      - "${OPSN_MAIL_WEBMAIL_PORT:-8888}:80"
    networks:
      openseclab:
        aliases:
          - mail.opensec.lab
          - webmail.opensec.lab
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/143' 2>/dev/null && bash -c '</dev/tcp/localhost/587' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # BookStack — Base de datos (MariaDB)
  # Profiles: wiki, all
  # ─────────────────────────────────────────────────────────────────
  opsn-wiki-db:
    image: mariadb:10.11
    container_name: opsn-wiki-db
    profiles: ["wiki", "all"]
    environment:
      - MYSQL_ROOT_PASSWORD=${OPSN_WIKI_DB_PASSWORD:-wiki_db_password}
      - MYSQL_DATABASE=bookstackapp
      - MYSQL_USER=bookstack
      - MYSQL_PASSWORD=${OPSN_WIKI_DB_PASSWORD:-wiki_db_password}
    volumes:
      - opsn_wiki_db:/var/lib/mysql
    networks:
      - openseclab
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root --password=$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # BookStack — Wiki con guias del lab
  # Profiles: wiki, all
  # ─────────────────────────────────────────────────────────────────
  opsn-wiki:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: opsn-wiki
    profiles: ["wiki", "all"]
    entrypoint: ["/bookstack-wrapper.sh"]
    depends_on:
      opsn-wiki-db:
        condition: service_healthy
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
      - APP_URL=http://localhost:${OPSN_WIKI_PORT:-6875}
      - DB_HOST=opsn-wiki-db
      - DB_PORT=3306
      - DB_USER=bookstack
      - DB_PASS=${OPSN_WIKI_DB_PASSWORD:-wiki_db_password}
      - DB_DATABASE=bookstackapp
      - APP_KEY=${OPSN_WIKI_APP_KEY:-base64:rmMpNWdjxGApnthwA70jRrCQFJSkbuwY7W7rncXLCws}
      - OPSN_DOMAIN=${OPSN_DOMAIN:-opensec.lab}
      - OPSN_WIKI_PORT=${OPSN_WIKI_PORT:-6875}
      - OPSN_WIKI_PASSWORD=${OPSN_WIKI_PASSWORD:-Password}
      - OPSN_WIKI_TOKEN_ID=${OPSN_WIKI_TOKEN_ID:-opsn_init_id_placeholder}
      - OPSN_WIKI_TOKEN_SECRET=${OPSN_WIKI_TOKEN_SECRET:-opsn_init_secret_placeholder}
    volumes:
      - opsn_wiki_data:/config
      - ./services/wiki/bookstack-wrapper.sh:/bookstack-wrapper.sh:ro
      - ./services/wiki/bookstack-init.sh:/custom-cont-init.d/99-opsn-bookstack-setup.sh:ro
    ports:
      - "${OPSN_WIKI_PORT:-6875}:80"
    networks:
      - openseclab
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # BookStack Init — carga guias y cheat sheets via API (sidecar efímero)
  # Profiles: wiki, all
  # ─────────────────────────────────────────────────────────────────
  opsn-wiki-init:
    image: alpine/curl:latest
    container_name: opsn-wiki-init
    profiles: ["wiki", "all"]
    depends_on:
      opsn-wiki:
        condition: service_healthy
    environment:
      - OPSN_WIKI_TOKEN_ID=${OPSN_WIKI_TOKEN_ID:-opsn_init_id_placeholder}
      - OPSN_WIKI_TOKEN_SECRET=${OPSN_WIKI_TOKEN_SECRET:-opsn_init_secret_placeholder}
    volumes:
      - ./services/wiki/configure_wiki.sh:/configure_wiki.sh:ro
      - ./services/lib/common.sh:/lib/common.sh:ro
    entrypoint: ["/bin/sh", "/configure_wiki.sh"]
    networks:
      - openseclab
    restart: "no"

  # ─────────────────────────────────────────────────────────────────
  # Gitea — Repositorios de código vulnerable
  # Profiles: gitea, all
  # ─────────────────────────────────────────────────────────────────
  opsn-gitea:
    image: gitea/gitea:latest
    container_name: opsn-gitea
    profiles: ["gitea", "all"]
    entrypoint: ["/gitea-entrypoint.sh"]
    command: ["/usr/bin/s6-svscan", "/etc/s6"]
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__PATH=/data/gitea/gitea.db
      - GITEA__server__DOMAIN=git.${OPSN_DOMAIN:-opensec.lab}
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__ROOT_URL=http://localhost:${OPSN_GITEA_PORT:-3002}/
      - GITEA__server__DISABLE_SSH=false
      - GITEA__server__SSH_PORT=${OPSN_GITEA_SSH_PORT:-2222}
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__service__DISABLE_REGISTRATION=true
      - OPSN_GITEA_ADMIN_USER=${OPSN_GITEA_ADMIN_USER:-admin}
      - OPSN_GITEA_PASSWORD=${OPSN_GITEA_PASSWORD:-Password}
      - OPSN_DOMAIN=${OPSN_DOMAIN:-opensec.lab}
    volumes:
      - opsn_gitea_data:/data
      - ./services/gitea/gitea-entrypoint.sh:/gitea-entrypoint.sh:ro
    ports:
      - "${OPSN_GITEA_PORT:-3002}:3000"
      - "${OPSN_GITEA_SSH_PORT:-2222}:22"
    networks:
      - openseclab
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000 > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Gitea Init — crea repos vulnerables via API (sidecar efímero)
  # Profiles: gitea, all
  # ─────────────────────────────────────────────────────────────────
  opsn-gitea-init:
    image: alpine/curl:latest
    container_name: opsn-gitea-init
    profiles: ["gitea", "all"]
    depends_on:
      opsn-gitea:
        condition: service_healthy
    environment:
      - OPSN_DOMAIN=${OPSN_DOMAIN:-opensec.lab}
      - OPSN_GITEA_PASSWORD=${OPSN_GITEA_PASSWORD:-Password}
      - OPSN_GITEA_ADMIN_USER=${OPSN_GITEA_ADMIN_USER:-admin}
      - OPSN_GITEA_PORT=${OPSN_GITEA_PORT:-3002}
    volumes:
      - ./services/gitea/configure_gitea.sh:/configure_gitea.sh:ro
      - ./services/lib/common.sh:/lib/common.sh:ro
    entrypoint: ["/bin/sh", "/configure_gitea.sh"]
    networks:
      - openseclab
    restart: "no"

  # ─────────────────────────────────────────────────────────────────
  # Portal Init — genera el HTML del dashboard (sidecar efímero)
  # Profiles: portal, all
  # ─────────────────────────────────────────────────────────────────
  opsn-portal-init:
    image: alpine:latest
    container_name: opsn-portal-init
    profiles: ["portal", "all"]
    environment:
      - OPSN_DOMAIN=${OPSN_DOMAIN:-opensec.lab}
      - OPSN_DNS_CONSOLE_PORT=${OPSN_DNS_CONSOLE_PORT:-5380}
      - OPSN_DVWA_PORT=${OPSN_DVWA_PORT:-8080}
      - OPSN_JUICE_PORT=${OPSN_JUICE_PORT:-3000}
      - OPSN_GOPHISH_ADMIN_PORT=${OPSN_GOPHISH_ADMIN_PORT:-3333}
      - OPSN_DESKTOP_PORT=${OPSN_DESKTOP_PORT:-3100}
      - OPSN_MAIL_WEBMAIL_PORT=${OPSN_MAIL_WEBMAIL_PORT:-8888}
      - OPSN_WEBGOAT_PORT=${OPSN_WEBGOAT_PORT:-8081}
      - OPSN_CRAPI_PORT=${OPSN_CRAPI_PORT:-8025}
      - OPSN_PORTAINER_PORT=${OPSN_PORTAINER_PORT:-9443}
      - OPSN_PORTAINER_PASSWORD=${OPSN_PORTAINER_PASSWORD:-Password1234}
      - OPSN_CTFD_PORT=${OPSN_CTFD_PORT:-8000}
      - OPSN_WIKI_PORT=${OPSN_WIKI_PORT:-6875}
      - OPSN_GITEA_PORT=${OPSN_GITEA_PORT:-3002}
    volumes:
      - opsn_portal_html:/html
      - ./services/portal/generate_portal.sh:/generate_portal.sh:ro
    entrypoint: ["/bin/sh", "/generate_portal.sh"]
    networks:
      - openseclab
    restart: "no"

  # ─────────────────────────────────────────────────────────────────
  # Portal — nginx sirve el dashboard HTML
  # Profiles: portal, all
  # ─────────────────────────────────────────────────────────────────
  opsn-portal:
    image: nginx:alpine
    container_name: opsn-portal
    profiles: ["portal", "all"]
    depends_on:
      opsn-portal-init:
        condition: service_completed_successfully
    volumes:
      - opsn_portal_html:/html
      - ./services/portal/assets:/html/assets:ro
      - ./services/portal/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${OPSN_PORTAL_PORT:-8443}:80"
    networks:
      - openseclab
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # ─── TIER 3: BLUE TEAM — SIEM + IDS ─────────────────────────────
  # ─────────────────────────────────────────────────────────────────
  # NOTA: Requiere 12+ GB RAM y vm.max_map_count=262144 en el host.
  #   sudo sysctl -w vm.max_map_count=262144
  # ─────────────────────────────────────────────────────────────────

  # Wazuh Certs Generator — genera certificados SSL para el stack Wazuh
  # (contenedor efímero: corre una vez y sale)
  opsn-wazuh-certs:
    image: wazuh/wazuh-certs-generator:0.0.2
    container_name: opsn-wazuh-certs
    profiles: ["wazuh", "blue-team"]
    volumes:
      - ./services/wazuh/certs:/certificates
      - ./services/wazuh/config/certs.yml:/config/certs.yml:ro
    networks:
      - openseclab
    restart: "no"

  # ─────────────────────────────────────────────────────────────────
  # Wazuh Indexer — OpenSearch (almacenamiento de alertas e indices)
  # Profiles: wazuh, blue-team
  # Puerto interno: 9200 (HTTPS) — no expuesto al host
  # RAM: ~1.5 GB
  # ─────────────────────────────────────────────────────────────────
  opsn-wazuh-indexer:
    image: wazuh/wazuh-indexer:4.9.0
    container_name: opsn-wazuh-indexer
    profiles: ["wazuh", "blue-team"]
    depends_on:
      opsn-wazuh-certs:
        condition: service_completed_successfully
    hostname: opsn-wazuh-indexer
    environment:
      - OPENSEARCH_JAVA_OPTS=${OPSN_WAZUH_INDEXER_JAVA_OPTS:--Xms512m -Xmx512m -Djava.security.manager=allow}
      - bootstrap.memory_lock=true
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${OPSN_WAZUH_PASSWORD:-Password1.}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opsn_wazuh_indexer_data:/var/lib/wazuh-indexer
      - ./services/wazuh/certs:/usr/share/wazuh-indexer/certs
      - ./services/wazuh/config/wazuh_indexer.yml:/usr/share/wazuh-indexer/opensearch.yml:ro
    networks:
      openseclab:
        aliases:
          - wazuh.indexer
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Wazuh Manager — motor de analisis, correlacion y agentes
  # Profiles: wazuh, blue-team
  # Puertos: 1514 (agentes), 1515 (enrollment), 55000 (API REST)
  # RAM: ~500 MB
  # ─────────────────────────────────────────────────────────────────
  opsn-wazuh-manager:
    image: wazuh/wazuh-manager:4.9.0
    container_name: opsn-wazuh-manager
    profiles: ["wazuh", "blue-team"]
    depends_on:
      opsn-wazuh-certs:
        condition: service_completed_successfully
      opsn-wazuh-indexer:
        condition: service_started
    hostname: opsn-wazuh-manager
    environment:
      - INDEXER_URL=https://opsn-wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${OPSN_WAZUH_PASSWORD:-Password1.}
      - FILEBEAT_SSL_VERIFICATION_MODE=none
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/wazuh-manager.pem
      - SSL_KEY=/etc/ssl/wazuh-manager-key.pem
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=${OPSN_WAZUH_API_PASSWORD:-WazuhApiP4ss.}
    volumes:
      - opsn_wazuh_manager_data:/var/ossec/data
      - opsn_wazuh_manager_logs:/var/ossec/logs
      - opsn_wazuh_manager_etc:/var/ossec/etc
      - ./services/wazuh/certs:/etc/ssl:ro
      - opsn_suricata_logs:/var/ossec/logs/suricata:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./services/wazuh/config/ossec.conf:/wazuh-config-mount/etc/ossec.conf:ro
      - ./services/wazuh/rules/openseclab.xml:/var/ossec/etc/rules/openseclab.xml:ro
    ports:
      - "1514:1514/udp"
      - "1514:1514/tcp"
      - "1515:1515"
      - "${OPSN_WAZUH_API_PORT:-55000}:55000"
    networks:
      openseclab:
        aliases:
          - wazuh.manager
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Wazuh Dashboard — interfaz web de visualizacion (HTTPS)
  # Profiles: wazuh, blue-team
  # Puerto: 5601 (HTTPS)
  # RAM: ~500 MB
  # ─────────────────────────────────────────────────────────────────
  opsn-wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.9.0
    container_name: opsn-wazuh-dashboard
    profiles: ["wazuh", "blue-team"]
    depends_on:
      opsn-wazuh-certs:
        condition: service_completed_successfully
      opsn-wazuh-indexer:
        condition: service_started
      opsn-wazuh-manager:
        condition: service_started
    hostname: opsn-wazuh-dashboard
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${OPSN_WAZUH_PASSWORD:-Password1.}
      - WAZUH_API_URL=https://opsn-wazuh-manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=${OPSN_WAZUH_PASSWORD:-Password1.}
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=${OPSN_WAZUH_API_PASSWORD:-WazuhApiP4ss.}
    volumes:
      - ./services/wazuh/certs:/usr/share/wazuh-dashboard/certs:ro
      - ./services/wazuh/config/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro
      - ./services/wazuh/config/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml:ro
    ports:
      - "${OPSN_WAZUH_DASH_PORT:-5601}:5601"
    networks:
      openseclab:
        aliases:
          - wazuh.dashboard
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Wazuh Init — inicializa security index y dirs de logs (sidecar efimero)
  # Profiles: wazuh, blue-team
  # Requiere docker.sock para ejecutar comandos dentro del indexer y manager
  # ─────────────────────────────────────────────────────────────────
  opsn-wazuh-init:
    image: docker:cli
    container_name: opsn-wazuh-init
    profiles: ["wazuh", "blue-team"]
    depends_on:
      opsn-wazuh-certs:
        condition: service_completed_successfully
      opsn-wazuh-indexer:
        condition: service_started
      opsn-wazuh-manager:
        condition: service_started
    environment:
      - OPSN_WAZUH_INDEXER_HOST=opsn-wazuh-indexer
      - OPSN_WAZUH_INDEXER_PORT=9200
      - OPSN_WAZUH_PASSWORD=${OPSN_WAZUH_PASSWORD:-Password1.}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./services/wazuh/configure_wazuh.sh:/configure_wazuh.sh:ro
      - ./services/lib/common.sh:/lib/common.sh:ro
    entrypoint: ["/bin/sh", "/configure_wazuh.sh"]
    networks:
      - openseclab
    restart: "no"

  # ─────────────────────────────────────────────────────────────────
  # Suricata — IDS que monitorea el trafico de la red Docker
  # Profiles: suricata, blue-team
  # Sin puertos expuestos: escribe eve.json en volumen compartido
  # RAM: ~500 MB
  # NOTA: Requiere NET_ADMIN y NET_RAW capabilities
  # La variable OPSN_SURICATA_INTERFACE controla la interfaz a monitorear
  # (default: "any" — captura en todas las interfaces del host)
  # ─────────────────────────────────────────────────────────────────
  opsn-suricata:
    image: jasonish/suricata:latest
    container_name: opsn-suricata
    profiles: ["suricata", "blue-team"]
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    environment:
      - SURICATA_INTERFACE=${OPSN_SURICATA_INTERFACE:-any}
    volumes:
      - opsn_suricata_logs:/var/log/suricata
      - ./services/suricata/suricata.yaml:/etc/suricata/suricata.yaml
      - ./services/suricata/rules/openseclab.rules:/etc/suricata/rules/openseclab.rules
    command: ["-i", "${OPSN_SURICATA_INTERFACE:-any}", "-v"]
    restart: unless-stopped
