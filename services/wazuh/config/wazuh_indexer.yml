# services/wazuh/config/wazuh_indexer.yml
# Configuración de OpenSearch para Wazuh Indexer 4.9.x (single-node)
network.host: "0.0.0.0"
node.name: "wazuh-indexer"
cluster.initial_cluster_manager_nodes:
  - "wazuh-indexer"
cluster.name: "wazuh-cluster"
node.max_local_storage_nodes: "3"
path.data: /var/lib/wazuh-indexer
path.logs: /var/log/wazuh-indexer

# SSL: certificados generados por opsn-wazuh-certs
plugins.security.ssl.http.pemcert_filepath: /usr/share/wazuh-indexer/certs/wazuh-indexer.pem
plugins.security.ssl.http.pemkey_filepath: /usr/share/wazuh-indexer/certs/wazuh-indexer-key.pem
plugins.security.ssl.http.pemtrustedcas_filepath: /usr/share/wazuh-indexer/certs/root-ca.pem
plugins.security.ssl.transport.pemcert_filepath: /usr/share/wazuh-indexer/certs/wazuh-indexer.pem
plugins.security.ssl.transport.pemkey_filepath: /usr/share/wazuh-indexer/certs/wazuh-indexer-key.pem
plugins.security.ssl.transport.pemtrustedcas_filepath: /usr/share/wazuh-indexer/certs/root-ca.pem
plugins.security.ssl.http.enabled: true
plugins.security.ssl.transport.enforce_hostname_verification: false
plugins.security.ssl.transport.resolve_hostname: false

# Autorizacion
plugins.security.authcz.admin_dn:
  - "CN=admin,OU=Wazuh,O=Wazuh,L=California,C=US"
plugins.security.check_snapshot_restore_write_privileges: true
plugins.security.enable_snapshot_restore_privilege: true
plugins.security.nodes_dn:
  - "CN=wazuh-indexer,OU=Wazuh,O=Wazuh,L=California,C=US"
plugins.security.restapi.roles_enabled:
  - "all_access"
  - "security_rest_api_access"
plugins.security.system_indices.enabled: true
plugins.security.system_indices.indices:
  [".plugins-ml-model", ".plugins-ml-task", ".opendistro_security",
   ".opendistro-alerting-config", ".opendistro-alerting-alert*",
   ".opendistro-anomaly-results*", ".opendistro-anomaly-detector*",
   ".opendistro-anomaly-checkpoints", ".opendistro-anomaly-detection-state",
   ".opendistro-reports-*", ".opensearch-notifications-*", ".opensearch-notebooks",
   ".opensearch-observability", ".ql-datasources",
   ".opendistro-asynchronous-search-response*", ".replication-metadata-store",
   ".opensearch-knn-models", ".geospatial-ip2geo-data*"]
compatibility.override_main_response_version: true

# Docker Desktop en macOS no soporta seccomp — deshabilitar este check
bootstrap.system_call_filter: false
