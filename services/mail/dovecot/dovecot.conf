# /etc/dovecot/dovecot.conf

listen = *
protocols = imap lmtp

# Maildir sin %d — los usuarios se autentican sin @dominio
mail_location = maildir:/var/mail/%u

# Autenticación sin TLS (entorno de laboratorio)
auth_mechanisms = plain login
disable_plaintext_auth = no
ssl = no

# Normalizar username: strip del dominio antes de buscar en passwd-file
# Permite login con "admin" o "admin@opensec.lab"
auth_username_format = %Ln

# Auth via archivo passwd (funciona en Docker sin PAM)
passdb {
  driver = passwd-file
  args = /etc/dovecot/users
}

userdb {
  driver = static
  args = uid=vmail gid=vmail home=/var/mail/%u
}

# Socket de autenticación para Postfix
service auth {
  unix_listener /var/spool/postfix/private/auth {
    mode = 0660
    user = postfix
    group = postfix
  }
}

# Servicio LMTP para recibir correo de Postfix
service lmtp {
  unix_listener /var/spool/postfix/private/dovecot-lmtp {
    mode = 0660
    user = postfix
    group = postfix
  }
}

# Crear buzón automáticamente al recibir primer correo
lmtp_save_to_detail_mailbox = yes
protocol lmtp {
  mail_plugins = $mail_plugins
  postmaster_address = admin@opensec.lab
}
